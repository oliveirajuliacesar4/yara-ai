services:
  - type: web
    name: yara-ai-api
    env: node
    plan: starter
    buildCommand: pnpm install --shamefully-hoist && pnpm run build
    startCommand: pnpm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: PUBLIC_APP_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: DATABASE_URL
        fromDatabase:
          name: yara-ai-db
          property: connectionString
      - key: ADMIN_TOKEN
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: MERCADO_PAGO_ACCESS_TOKEN
        sync: false
      - key: ASAAS_API_KEY
        sync: false

databases:
  - name: yara-ai-db
    plan: starter
