openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: YARA - Plataforma de Geração de Sistemas com IA
servers:
  - url: /api
    description: Caminho base da API
tags:
  - name: health
    description: Saúde do servidor
  - name: auth
    description: Autenticação
  - name: projects
    description: Gestão de projetos
  - name: generate
    description: Geração de sistemas com IA
  - name: memoria
    description: Memória e aprendizado da YARA
  - name: github
    description: Integração com GitHub

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Verificação de saúde
      responses:
        "200":
          description: Servidor saudável
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Cadastrar novo usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Usuário criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: E-mail já cadastrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Entrar na plataforma
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login realizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Encerrar sessão
      responses:
        "200":
          description: Sessão encerrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Obter usuário autenticado
      responses:
        "200":
          description: Usuário atual
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: Listar projetos do usuário
      responses:
        "200":
          description: Lista de projetos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createProject
      tags: [projects]
      summary: Criar novo projeto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Projeto criado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/stats:
    get:
      operationId: getProjectStats
      tags: [projects]
      summary: Estatísticas do painel
      responses:
        "200":
          description: Estatísticas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectStats"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Obter projeto por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Projeto
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Atualizar projeto
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Projeto atualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Excluir projeto
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Excluído
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{id}/generate:
    post:
      operationId: generateSystem
      tags: [generate]
      summary: Iniciar geração de sistema com YARA (SSE streaming)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateInput"
      responses:
        "200":
          description: Stream SSE de geração
          content:
            text/event-stream:
              schema:
                type: string
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{id}/files:
    get:
      operationId: listProjectFiles
      tags: [projects]
      summary: Listar arquivos gerados do projeto
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lista de arquivos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeneratedFile"
        "404":
          description: Não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{id}/logs:
    get:
      operationId: listProjectLogs
      tags: [projects]
      summary: Listar logs de geração do projeto
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lista de logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LogEntry"
        "404":
          description: Não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{id}/github:
    post:
      operationId: publishToGithub
      tags: [github]
      summary: Publicar projeto no GitHub
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GithubPublishInput"
      responses:
        "200":
          description: Publicado no GitHub
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GithubPublishResult"
        "400":
          description: Erro de publicação
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /memoria:
    get:
      operationId: listMemoria
      tags: [memoria]
      summary: Listar memórias da YARA
      responses:
        "200":
          description: Lista de memórias
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MemoriaEntry"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
      required: [success]

    User:
      type: object
      required: [id, name, email, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        createdAt:
          type: string

    RegisterInput:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
        password:
          type: string
          minLength: 6

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/User"

    Project:
      type: object
      required: [id, userId, name, description, status, createdAt, updatedAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [pending, generating, completed, failed]
        techStack:
          type: ["string", "null"]
        generatedCode:
          type: ["string", "null"]
        githubUrl:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    ProjectInput:
      type: object
      required: [name, description]
      properties:
        name:
          type: string
          minLength: 2
        description:
          type: string
          minLength: 10
        techStack:
          type: string

    ProjectUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 2
        description:
          type: string

    GenerateInput:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string
          minLength: 10

    GeneratedFile:
      type: object
      required: [id, projectId, path, content, language, createdAt]
      properties:
        id:
          type: integer
        projectId:
          type: integer
        path:
          type: string
        content:
          type: string
        language:
          type: string
        createdAt:
          type: string

    LogEntry:
      type: object
      required: [id, projetoId, etapa, status, mensagem, criadoEm]
      properties:
        id:
          type: integer
        projetoId:
          type: integer
        etapa:
          type: string
        status:
          type: string
        mensagem:
          type: string
        duracao:
          type: ["integer", "null"]
        criadoEm:
          type: string

    ProjectStats:
      type: object
      required: [total, completed, generating, failed]
      properties:
        total:
          type: integer
        completed:
          type: integer
        generating:
          type: integer
        failed:
          type: integer

    GithubPublishInput:
      type: object
      required: [repoName]
      properties:
        repoName:
          type: string
          minLength: 2
        descricao:
          type: string
        privado:
          type: boolean

    GithubPublishResult:
      type: object
      required: [url, repoName]
      properties:
        url:
          type: string
        repoName:
          type: string
        mensagem:
          type: string

    MemoriaEntry:
      type: object
      required: [id, categoria, chave, valor, usos, criadoEm]
      properties:
        id:
          type: integer
        categoria:
          type: string
        chave:
          type: string
        valor:
          type: string
        contexto:
          type: ["string", "null"]
        usos:
          type: integer
        criadoEm:
          type: string
