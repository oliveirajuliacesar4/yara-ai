<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atlas One Admin</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="content">
      <section class="hero-panel">
        <div>
          <p class="eyebrow">Admin interno</p>
          <h1>Atlas One Admin</h1>
          <p>Visão operacional para usuários, IA, assinaturas, pagamentos e erros.</p>
        </div>
      </section>

      <section class="panel" style="margin-top: 18px">
        <form id="adminForm" class="inline-form">
          <input id="adminApiBase" type="url" placeholder="https://api.atlasone.com" />
          <input id="adminToken" type="password" placeholder="ADMIN_TOKEN" />
          <button class="button button-primary" type="submit">Carregar métricas</button>
        </form>
      </section>

      <section id="adminMetrics" class="metric-grid" style="margin-top: 18px"></section>
      <section class="panel" style="margin-top: 18px">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Logs importantes</p>
            <h3>Eventos recentes</h3>
          </div>
        </div>
        <div id="adminLogs" class="stack-list"></div>
      </section>
    </main>

    <script src="config.js"></script>
    <script>
      const apiBase = document.getElementById("adminApiBase");
      const token = document.getElementById("adminToken");
      const metrics = document.getElementById("adminMetrics");
      const logs = document.getElementById("adminLogs");

      apiBase.value = (window.ATLAS_CONFIG?.API_BASE_URL || "https://api.atlasone.com").replace(/\/$/, "");

      document.getElementById("adminForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        metrics.innerHTML = "";
        logs.innerHTML = "";
        const res = await fetch(`${apiBase.value.replace(/\/$/, "")}/api/admin/metrics`, {
          headers: { Authorization: `Bearer ${token.value}` },
        });
        const payload = await res.json();
        if (!res.ok) {
          logs.innerHTML = `<div class="empty-state">${payload.error || "Falha ao carregar métricas."}</div>`;
          return;
        }
        metrics.innerHTML = [
          ["Usuários", payload.users],
          ["Uso da IA", payload.aiRequests],
          ["Erros API", payload.apiErrors],
          ["Consumo estimado", payload.estimatedCost],
          ["Assinaturas", payload.subscriptions],
          ["Pagamentos", payload.payments],
        ]
          .map(([label, value]) => `<article class="metric-card"><span>${label}</span><strong>${value}</strong><p>Produção</p></article>`)
          .join("");
        logs.innerHTML = payload.logs
          .map((item) => `<div class="stack-row"><div><strong>${item.type}</strong><p>${item.message}</p></div><span>${item.created_at}</span></div>`)
          .join("");
      });
    </script>
  </body>
</html>
